spring.application.name=gestao
# server.address=127.0.0.1 foi cogitado (achado de security review) para restringir a
# app à mesma exposição de rede do resto dos serviços (D004), mas foi testado e
# descartado: host.docker.internal (usado pelo Prometheus para escrapar a app - specs/002)
# resolve para o gateway da bridge do Docker (ex: 172.17.0.1), não para 127.0.0.1 - a app
# precisa continuar acessível em todas as interfaces enquanto rodar fora do compose (D003)
# e for escrapada por um container. A mitigação real aqui é a credencial dedicada abaixo.

# Por padrão, o Spring Boot desativa o spring-boot-docker-compose durante testes
# (spring.docker.compose.skip.in-tests=true). Nesta fase, o único teste existente
# (GestaoApplicationTests#contextLoads) depende do compose.yaml estar de pé para
# validar a conexão real com os serviços de infra (ver specs/001-infraestrutura-base.md,
# seção 7). Quando testes de integração com Testcontainers entrarem (Fase 2+), reavaliar
# se ainda faz sentido manter isto habilitado.
spring.docker.compose.skip.in-tests=false

# Observabilidade (specs/002-observabilidade.md)
# Expor só o estritamente necessário nesta fase - nunca "include=*".
management.endpoints.web.exposure.include=health,prometheus
management.tracing.sampling.probability=1.0
management.metrics.tags.application=${spring.application.name}
# JAEGER_OTLP_HTTP_PORT também controla a porta publicada do Jaeger no compose.yaml;
# como a app roda no host (D003), essa variável precisa ser exportada no ambiente do
# processo Java também, não só lida do .env (que só o docker compose lê).
management.otlp.tracing.endpoint=http://localhost:${JAEGER_OTLP_HTTP_PORT:4318}/v1/traces
# Formato JSON nativo do Spring Boot (Elastic Common Schema); inclui traceId/spanId
# automaticamente via MDC quando o Micrometer Tracing está ativo.
logging.structured.format.console=ecs
# A app roda no host, fora do compose (D003) - o driver json-file do Docker só
# captura log de containers, nunca de um processo do host. Por isso a app também
# escreve em arquivo (mesmo formato ECS), e esse arquivo é montado (bind mount,
# leitura) no container do Promtail - ver compose.yaml/docker/promtail.
logging.file.name=logs/gestao.log
logging.structured.format.file=ecs

# Seguranca: RBAC via Keycloak (specs/003-seguranca-rbac-abac.md)
# A app roda no host, fora do compose (D003), e conecta na porta publicada do
# Keycloak em loopback (mesmo padrao de D004). O Spring Security busca o JWKS do
# realm nesse issuer para validar assinatura/expiracao dos tokens.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:${KEYCLOAK_HTTP_PORT:8081}/realms/gestao

# Credencial dedicada (Basic Auth) so para o scrape do Prometheus em
# /actuator/prometheus (achado de security review - H1: esse endpoint nao pode ficar
# publico, expoe padroes de trafego/latencia da API). E' um valor de desenvolvimento,
# nao uma credencial de usuario de negocio - precisa bater com docker/prometheus/prometheus.yml.
# Indirecao via variavel de ambiente (mesmo padrao das demais properties deste arquivo,
# ex: JAEGER_OTLP_HTTP_PORT/KEYCLOAK_HTTP_PORT) - achado de security review: o literal
# puro, sem nenhuma indirecao, destoava do resto deste arquivo. Exporte
# PROMETHEUS_SCRAPE_PASSWORD antes de "./mvnw spring-boot:run" para sobrescrever.
spring.security.user.name=prometheus
spring.security.user.password=${PROMETHEUS_SCRAPE_PASSWORD:changeme-prometheus-scrape-local}
spring.security.user.roles=PROMETHEUS

# Mensageria assincrona real via RabbitMQ (specs/007-mensageria-rabbitmq.md, D002/D032-D035)
# Conexao com o RabbitMQ (host/porta/credenciais) e' auto-descoberta via
# spring-boot-docker-compose (porta 5672 efemera no compose.yaml) - mesmo padrao ja usado
# para Postgres/Redis (D003), nenhuma property de conexao explicita necessaria aqui.

# Outbox: a tabela event_publication (V8, Fase 3) ja persiste cada publicacao antes de
# entrega-la aos listeners/externalizadores. Sem esta flag, um evento cuja entrega falhou
# antes da aplicacao cair ficaria pendente para sempre; com ela, e' reenviado no proximo
# start (specs/007, secao 4.3).
spring.modulith.events.republish-outstanding-events-on-restart=true

# Cria spans de Observation para publish/consume do RabbitMQ (visiveis no Jaeger), mas
# NAO propaga o traceId da requisicao HTTP original ate o consumidor - achado empirico
# (D034): a externalizacao do Modulith roda de forma assincrona numa thread propria (ex:
# "task-1"), fora do escopo do ThreadLocal de span da requisicao, entao nem esta config
# nativa nem um MessagePostProcessor manual no RabbitTemplate conseguem capturar o span
# correto no momento do publish. O traceId da requisicao original e' capturado de forma
# sincrona em MatriculaService (na propria thread HTTP, antes do publishEvent) e viaja
# como campo no payload do evento ate o consumidor (notificacao.MatriculaNotificacaoListener),
# que o coloca no MDC - ver D034 para o historico completo da investigacao. Estas duas
# flags sao mantidas mesmo assim, pelo valor observacional que ainda oferecem (spans de
# publish/consume no Jaeger), so' nao pelo motivo originalmente cogitado.
spring.rabbitmq.template.observation-enabled=true
spring.rabbitmq.listener.observation-enabled=true

# Requisito tecnico do desenho de retry via TTL+DLX (D033, specs/007 secao 4.4): sem isto,
# uma excecao no listener faz o RabbitMQ devolver a mensagem para o inicio da MESMA fila
# (nack com requeue=true, o default do Spring AMQP) - loop de falha imediata, nunca chega
# na fila de espera. Com false, vira nack sem requeue, e o RabbitMQ roteia via o
# dead-letter-exchange configurado na fila (config.MensageriaConfig).
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Cliente administrativo do Keycloak (specs/010) - usado só pelo módulo administracao para
# listar usuários e reatribuir papel via Admin API. client_credentials com o client
# confidential gestao-backend (D013), cujo service account ganhou os client roles de
# realm-management view-users/manage-users/query-users (D045/D046).
# Fallback de desenvolvimento (mesmo padrão de JAEGER_OTLP_HTTP_PORT/KEYCLOAK_HTTP_PORT/
# PROMETHEUS_SCRAPE_PASSWORD acima) - sem ele, qualquer @SpringBootTest falha ao criar o
# bean keycloakAdmin (PlaceholderResolutionException) em qualquer shell que não tenha
# `source .env`, incluindo o `./mvnw clean verify` do CI (bug encontrado ao rodar a
# suíte completa pela primeira vez após o KeycloakAdminConfig ganhar consumidor real, D013).
gestao.keycloak-admin.server-url=http://localhost:${KEYCLOAK_HTTP_PORT:8081}
gestao.keycloak-admin.realm=gestao
gestao.keycloak-admin.client-id=gestao-backend
gestao.keycloak-admin.client-secret=${KEYCLOAK_BACKEND_CLIENT_SECRET:changeme-keycloak-backend-secret-local}
